<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>$TANDARD / DEVIANT$ Meter</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      html, body {
        margin: 0;
        background: transparent;
      }

      body {
        padding: 0;
      }

      .meter-card {
        display: grid;
        gap: 12px;
        padding: 16px 18px 18px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: linear-gradient(180deg, rgba(16, 31, 24, 0.94) 0%, rgba(7, 12, 10, 0.97) 100%);
        color: #f6f8f7;
        box-shadow: 0 20px 48px rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(18px);
      }

      .meter-kicker {
        margin: 0;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #7bd3b1;
      }

      .meter-title {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }

      .meter-summary,
      .meter-meta-line {
        margin: 0;
        font-size: 13px;
        line-height: 1.45;
        color: rgba(246, 248, 247, 0.76);
        font-variant-numeric: tabular-nums;
      }

      .meter-amount {
        margin: 0;
        font-size: 32px;
        font-weight: 800;
        line-height: 1;
        color: #7bd3b1;
        font-variant-numeric: tabular-nums;
      }

      .meter-countdown {
        color: #ffd479;
      }
    </style>
  </head>
  <body>
    <main class="meter-card">
      <p class="meter-kicker" id="meter-kicker">Live meter</p>
      <h1 class="meter-title" id="meter-title">Waiting for meter state</h1>
      <p class="meter-summary" id="meter-summary">$TANDARD / DEVIANT$ will show the active grace period or running charge here.</p>
      <p class="meter-amount" id="meter-amount">0.0000 SOL</p>
      <p class="meter-meta-line" id="meter-rate">Rate: 0.0000 SOL/hr</p>
      <p class="meter-meta-line" id="meter-cap">Cap: 0.0000 SOL</p>
      <p class="meter-meta-line" id="meter-status">No active metering</p>
    </main>
    <script>
      const LAMPORTS_PER_SOL = 1_000_000_000;
      let currentState = null;
      let renderTimerId = null;

      const titleElement = document.getElementById("meter-title");
      const summaryElement = document.getElementById("meter-summary");
      const amountElement = document.getElementById("meter-amount");
      const rateElement = document.getElementById("meter-rate");
      const capElement = document.getElementById("meter-cap");
      const statusElement = document.getElementById("meter-status");

      function formatSol(lamports) {
        return `${(Math.max(0, Number(lamports) || 0) / LAMPORTS_PER_SOL).toFixed(4)} SOL`;
      }

      function formatRate(ratePerSecondLamports) {
        const solPerHour = ((Number(ratePerSecondLamports) || 0) * 3600) / LAMPORTS_PER_SOL;
        return `${solPerHour.toFixed(4)} SOL/hr`;
      }

      function getAccruedLamports(state, now = new Date()) {
        if (!state || state.status !== "meter_running" || !state.meterStartedAt) {
          return Math.max(0, Number(state?.accruedLamports) || 0);
        }

        const startedAt = new Date(state.meterStartedAt);
        if (Number.isNaN(startedAt.getTime())) {
          return Math.max(0, Number(state?.accruedLamports) || 0);
        }

        const elapsedSeconds = Math.max(0, (now.getTime() - startedAt.getTime()) / 1000);
        const accruedLamports = Math.round((Number(state.ratePerSecondLamports) || 0) * elapsedSeconds);
        return Math.min(Math.max(0, Number(state.maxFeeLamports) || 0), accruedLamports);
      }

      function formatCountdown(targetTime) {
        const targetDate = new Date(targetTime || "");
        if (Number.isNaN(targetDate.getTime())) {
          return "5";
        }

        const remainingSeconds = Math.max(0, Math.ceil((targetDate.getTime() - Date.now()) / 1000));
        return String(remainingSeconds);
      }

      function renderState() {
        if (!currentState) {
          titleElement.textContent = "Waiting for meter state";
          summaryElement.textContent = "$TANDARD / DEVIANT$ will show the active grace period or running charge here.";
          amountElement.textContent = "0.0000 SOL";
          amountElement.classList.remove("meter-countdown");
          rateElement.textContent = "Rate: 0.0000 SOL/hr";
          capElement.textContent = "Cap: 0.0000 SOL";
          statusElement.textContent = "No active metering";
          return;
        }

        const matchedTargets = Array.isArray(currentState.matchedTargets) ? currentState.matchedTargets.filter(Boolean) : [];
        const targetLabel = matchedTargets[0] || currentState.title || "Blocked app";
        titleElement.textContent = targetLabel;
        summaryElement.textContent = `Close ${targetLabel} to stop the meter.`;
        rateElement.textContent = `Rate: ${formatRate(currentState.ratePerSecondLamports)}`;
        capElement.textContent = `Cap: ${formatSol(currentState.maxFeeLamports)}`;

        if (currentState.status === "grace_period") {
          amountElement.textContent = formatCountdown(currentState.graceEndsAt);
          amountElement.classList.add("meter-countdown");
          statusElement.textContent = "Grace period: close it before the countdown ends.";
          return;
        }

        amountElement.textContent = formatSol(getAccruedLamports(currentState));
        amountElement.classList.remove("meter-countdown");
        statusElement.textContent = "Meter running now.";
      }

      function bindState(nextState) {
        currentState = nextState || null;
        renderState();

        if (renderTimerId) {
          clearInterval(renderTimerId);
          renderTimerId = null;
        }

        if (currentState) {
          renderTimerId = setInterval(renderState, 1000);
        }
      }

      window.saintRockyDesktop?.onMeterOverlayStateChange?.((payload) => {
        bindState(payload || null);
      });

      bindState(null);
    </script>
  </body>
</html>
